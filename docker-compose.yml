version: "3.8"

services:
  app:
    build: .
    container_name: stock-tracker-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    environment:
      - TF_CPP_MIN_LOG_LEVEL=2
      - LOW_RESOURCE_MODE=${LOW_RESOURCE_MODE:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build: .
    container_name: stock-tracker-worker
    command: ["python", "worker.py"]
    volumes:
      - ./data:/app/data
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    environment:
      - TF_CPP_MIN_LOG_LEVEL=2
      - LOW_RESOURCE_MODE=${LOW_RESOURCE_MODE:-true}
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

