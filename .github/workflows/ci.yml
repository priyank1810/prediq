name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Syntax check on key files
        run: |
          python -m py_compile main.py
          python -m py_compile app/config.py
          python -m py_compile app/database.py
          python -m py_compile app/models.py
          python -m py_compile app/schemas.py
          python -m py_compile app/auth.py

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '~/prediq' }}
            git pull origin main
            pip install -r requirements.txt --quiet
            # Restart the app (adjust to your process manager)
            if command -v supervisorctl &> /dev/null; then
              supervisorctl restart prediq prediq-worker
            elif command -v systemctl &> /dev/null; then
              sudo systemctl restart prediq prediq-worker
            elif [ -f docker-compose.yml ]; then
              docker compose up -d --build
            else
              # PM2 fallback
              pm2 restart prediq || echo "Manual restart needed"
            fi
